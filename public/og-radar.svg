<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 630"
  width="1200"
  height="630"
>
  <defs>
    <style>
      @keyframes sweep {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      .sweep-line {
        animation: sweep 3s linear infinite;
        transform-origin: 600px 315px;
      }
    </style>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#72d4e8" stop-opacity="0.16" />
      <stop offset="100%" stop-color="#07111f" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#07111f" />

  <!-- Gradient overlay -->
  <circle cx="600" cy="315" r="400" fill="url(#bgGradient)" />

  <!-- Grid background -->
  <g stroke="rgba(180, 205, 242, 0.08)" stroke-width="1">
    <line x1="0" y1="315" x2="1200" y2="315" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="300" y1="0" x2="300" y2="630" />
    <line x1="900" y1="0" x2="900" y2="630" />
    <line x1="0" y1="157.5" x2="1200" y2="157.5" />
    <line x1="0" y1="472.5" x2="1200" y2="472.5" />
  </g>

  <!-- Concentric circles -->
  <g stroke="rgba(114, 212, 232, 0.4)" stroke-width="1.5" fill="none">
    <circle cx="600" cy="315" r="60" />
    <circle cx="600" cy="315" r="120" />
    <circle cx="600" cy="315" r="180" />
  </g>

  <!-- Diagonal lines -->
  <g stroke="rgba(114, 212, 232, 0.2)" stroke-width="1">
    <line x1="420" y1="135" x2="780" y2="495" />
    <line x1="780" y1="135" x2="420" y2="495" />
  </g>

  <!-- Animated sweep line -->
  <g class="sweep-line">
    <line x1="600" y1="315" x2="600" y2="135" stroke="rgba(114, 212, 232, 0.8)" stroke-width="2" />
    <!-- Sweep trail -->
    <path
      d="M 600 315 L 680 175 A 180 180 0 0 1 640 132 Z"
      fill="rgba(114, 212, 232, 0.15)"
    />
  </g>

  <!-- Center blip -->
  <circle cx="600" cy="315" r="6" fill="#e3b36a" />

  <!-- Outer blip (30 degrees offset) -->
  <g class="sweep-line" style="animation-delay: -1s">
    <circle cx="600" cy="207" r="3" fill="rgba(227, 179, 106, 0.7)" />
  </g>

  <!-- Title text -->
  <text
    x="600"
    y="180"
    font-family="Georgia, serif"
    font-size="72"
    font-weight="bold"
    fill="rgba(245, 241, 232, 0.95)"
    text-anchor="middle"
  >
    El Radar TV
  </text>

  <!-- Subtitle -->
  <text
    x="600"
    y="430"
    font-family="Arial, sans-serif"
    font-size="48"
    font-weight="bold"
    fill="rgba(114, 212, 232, 0.8)"
    text-anchor="middle"
  >
    Portal Oficial · Chile
  </text>
</svg>
